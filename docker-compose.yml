services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pm-backend
    ports:
      - '8000:8000'
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-oss-120b}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_TIMEOUT_SECONDS: ${OPENROUTER_TIMEOUT_SECONDS:-15}
      OPENROUTER_MAX_RETRIES: ${OPENROUTER_MAX_RETRIES:-2}
      OPENROUTER_RETRY_BACKOFF_SECONDS: ${OPENROUTER_RETRY_BACKOFF_SECONDS:-0.3}
      OPENROUTER_TEMPERATURE: ${OPENROUTER_TEMPERATURE:-0}
      OPENROUTER_MAX_TOKENS: ${OPENROUTER_MAX_TOKENS:-64}
    restart: unless-stopped
